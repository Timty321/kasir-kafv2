<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS KASIR-KAF | Admin</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .tab-btn.active {
      color: #ea580c;
    }
    .tab-content {
      animation: fadeIn 0.3s ease-in-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .low-stock {
      background-color: #fef3c7;
    }
    .modal-overlay {
      animation: fadeIn 0.2s ease-in-out;
    }
  </style>
</head>
<body class="bg-gray-100 pb-20 lg:pb-0">
  <!-- Header -->
  <div class="bg-orange-600 text-white p-4 shadow-md sticky top-0 z-20">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <div>
        <h1 class="text-2xl font-bold">🍗 KASIR-KAF</h1>
        <p class="text-orange-100 text-sm">Admin Panel</p>
      </div>
      <a href="/" class="bg-white text-orange-600 px-4 py-2 rounded-lg font-semibold hover:bg-orange-50">
        ← Kembali ke Penjualan
      </a>
    </div>
  </div>

  <!-- Tab Navigation -->
  <div class="bg-white border-b sticky top-16 z-10">
    <div class="max-w-7xl mx-auto flex">
      <button
        class="tab-btn px-6 py-3 font-semibold text-gray-600 hover:text-orange-600 transition"
        onclick="switchTab('inventory')"
        data-tab="inventory"
      >
        📦 Inventori
      </button>
      <button
        class="tab-btn px-6 py-3 font-semibold text-gray-600 hover:text-orange-600 transition"
        onclick="switchTab('history')"
        data-tab="history"
      >
        📊 Riwayat
      </button>
    </div>
  </div>

  <!-- Content -->
  <div class="max-w-7xl mx-auto p-4">
    <!-- Inventory Tab -->
    <div id="inventoryTab" class="tab-content">
      <!-- Add Product Button and Filters -->
      <div class="mb-6 flex flex-col gap-4 md:flex-row md:justify-between md:items-center">
        <div class="flex gap-2">
          <input
            type="date"
            id="inventoryDate"
            class="border-2 border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-orange-600"
          >
          <button
            onclick="filterInventory()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition"
          >
            🔍 Filter
          </button>
        </div>
        <button
          id="addProductBtn"
          class="bg-orange-600 hover:bg-orange-700 text-white px-6 py-2 rounded-lg font-semibold transition"
          onclick="openAddProductModal()"
        >
          ➕ Tambah Produk
        </button>
      </div>

      <!-- Products Table -->
      <div class="bg-white rounded-lg shadow-md overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-200">
            <tr>
              <th class="px-4 py-3 text-left font-bold">Nama Produk</th>
              <th class="px-4 py-3 text-left font-bold">Kategori</th>
              <th class="px-4 py-3 text-right font-bold">Harga</th>
              <th class="px-4 py-3 text-center font-bold">Stok</th>
              <th class="px-4 py-3 text-center font-bold">Min Stok</th>
              <th class="px-4 py-3 text-center font-bold">Aksi</th>
            </tr>
          </thead>
          <tbody id="inventoryTable">
            <tr class="text-center">
              <td colspan="6" class="py-8 text-gray-500">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

    <!-- History Tab -->
    <div id="historyTab" class="hidden tab-content">
      <!-- Filter Section -->
      <div class="mb-6 flex flex-col gap-4 md:flex-row md:justify-between md:items-center">
        <div class="flex gap-2 flex-col md:flex-row">
          <select
            id="logType"
            class="border-2 border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-orange-600"
          >
            <option value="">Semua Aktivitas</option>
            <option value="inventory">📦 Inventori</option>
            <option value="transaction">💳 Transaksi</option>
          </select>
          <input
            type="date"
            id="logDate"
            class="border-2 border-gray-300 rounded-lg px-4 py-2 focus:outline-none focus:border-orange-600"
          >
          <button
            onclick="filterLogs()"
            class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-semibold transition"
          >
            🔍 Filter
          </button>
        </div>
      </div>

      <!-- Logs Table -->
      <div class="bg-white rounded-lg shadow-md overflow-x-auto">
        <table class="w-full text-sm">
          <thead class="bg-gray-200">
            <tr>
              <th class="px-4 py-3 text-left font-bold">Tipe</th>
              <th class="px-4 py-3 text-left font-bold">Aksi</th>
              <th class="px-4 py-3 text-left font-bold">Pesan</th>
              <th class="px-4 py-3 text-left font-bold">Waktu</th>
            </tr>
          </thead>
          <tbody id="historyTable">
            <tr class="text-center">
              <td colspan="4" class="py-8 text-gray-500">Memuat data...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Add/Edit Product Modal -->
  <div id="productModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="modal-overlay absolute inset-0" onclick="closeProductModal()"></div>
    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-md max-h-screen overflow-y-auto m-4">
      <div class="bg-orange-600 text-white p-4 flex justify-between items-center sticky top-0">
        <h2 class="text-lg font-bold" id="productModalTitle">Tambah Produk</h2>
        <button onclick="closeProductModal()" class="text-2xl">✕</button>
      </div>

      <div class="p-6 space-y-4">
        <div>
          <label class="block font-semibold text-gray-700 mb-2">Nama Produk</label>
          <input type="text" id="productName" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-orange-600">
        </div>

        <div>
          <label class="block font-semibold text-gray-700 mb-2">Kategori</label>
          <select id="productCategory" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-orange-600">
            <option value="">-- Pilih Kategori --</option>
          </select>
        </div>

        <div class="grid grid-cols-2 gap-4">
          <div>
            <label class="block font-semibold text-gray-700 mb-2">Harga (Rp)</label>
            <input type="number" id="productPrice" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-orange-600" min="0">
          </div>

          <div>
            <label class="block font-semibold text-gray-700 mb-2">Stok</label>
            <input type="number" id="productStock" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-orange-600" min="0">
          </div>
        </div>

        <div>
          <label class="block font-semibold text-gray-700 mb-2">Stok Minimum</label>
          <input type="number" id="productMinStock" class="w-full border-2 border-gray-300 rounded-lg p-3 focus:outline-none focus:border-orange-600" min="0" value="5">
        </div>

        <button
          id="saveProductBtn"
          class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-lg transition mt-6"
          onclick="saveProduct()"
        >
          ✓ Simpan Produk
        </button>
      </div>
    </div>
  </div>

  <!-- Delete Confirmation Modal -->
  <div id="deleteModal" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-black bg-opacity-50">
    <div class="modal-overlay absolute inset-0" onclick="closeDeleteModal()"></div>
    <div class="relative bg-white rounded-lg shadow-2xl w-full max-w-sm m-4">
      <div class="p-6 text-center">
        <p class="text-2xl mb-4">⚠️</p>
        <h2 class="text-lg font-bold mb-4">Apakah Anda yakin?</h2>
        <p class="text-gray-600 mb-6">Produk yang dihapus tidak bisa dikembalikan.</p>

        <div class="flex gap-3">
          <button
            onclick="closeDeleteModal()"
            class="flex-1 bg-gray-300 hover:bg-gray-400 text-gray-800 font-semibold py-2 rounded-lg transition"
          >
            ✕ Batal
          </button>
          <button
            onclick="confirmDelete()"
            class="flex-1 bg-red-600 hover:bg-red-700 text-white font-semibold py-2 rounded-lg transition"
          >
            🗑️ Hapus
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Mobile Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 lg:hidden bg-white border-t shadow-lg z-30">
    <div class="flex justify-around">
      <a href="/" class="flex-1 py-3 text-center text-gray-600 font-semibold">
        🏪 Penjualan
      </a>
      <button onclick="switchTab('inventory')" class="flex-1 py-3 text-center text-orange-600 border-t-2 border-orange-600 font-semibold">
        📦 Inventori
      </button>
      <button onclick="switchTab('history')" class="flex-1 py-3 text-center text-gray-600 font-semibold">
        📊 Riwayat
      </button>
    </div>
  </nav>

  <!-- Success Toast -->
  <div id="successToast" class="hidden fixed top-4 right-4 bg-green-600 text-white px-6 py-3 rounded-lg shadow-lg z-40">
    ✓ <span id="toastMessage">Operasi berhasil</span>
  </div>

  <!-- Error Toast -->
  <div id="errorToast" class="hidden fixed top-4 right-4 bg-red-600 text-white px-6 py-3 rounded-lg shadow-lg z-40">
    ✗ <span id="errorMessage">Terjadi kesalahan</span>
  </div>

  <script src="/js/app.js"></script>
</body>
</html>
