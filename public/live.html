<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>POS KASIR-KAF | Live Stock</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
      background-color: #f8fafc;
    }

    .low-stock {
      background-color: #fef3c7;
      border: 2px solid #fbbf24;
    }

    .crit-stock {
      background-color: #fee2e2;
      border: 2px solid #ef4444;
    }

    .stock-card {
      transition: all 0.3s ease;
    }

    .stock-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }
  </style>
  <script>
    if (localStorage.getItem('user_role') !== 'owner') {
        window.location.href = '/login.html';
    }
    function logout() {
        localStorage.removeItem('user_role');
        window.location.href = '/login.html';
    }
  </script>
</head>

<body class="bg-gray-100 pb-20">
  <!-- Header -->
  <div
    class="bg-gradient-to-r from-orange-500 to-rose-500 text-white p-6 shadow-md sticky top-0 z-20 relative overflow-hidden">
    <div class="absolute -right-10 -top-10 w-40 h-40 bg-white opacity-10 rounded-full blur-3xl"></div>
    <div class="absolute left-10 -bottom-10 w-32 h-32 bg-orange-300 opacity-20 rounded-full blur-2xl"></div>
    <div class="max-w-7xl mx-auto flex justify-between items-center relative z-10">
      <div>
        <h1 class="text-3xl font-extrabold tracking-tight drop-shadow-sm">📡 Live Stock</h1>
        <p class="text-orange-100 font-medium mt-1 text-sm">Pantau stok produk & bahan secara real-time</p>
      </div>
      <div class="flex items-center gap-2">
        <span id="lastSync"
          class="text-xs font-bold bg-white/20 backdrop-blur-md border border-white/50 px-3 py-1.5 rounded-full shadow-sm">Syncing...</span>
        <button onclick="logout()" class="ml-2 bg-white/20 text-white px-4 py-1.5 rounded-full border border-white/50 font-bold hover:bg-white hover:text-orange-600 transition-all shadow-sm">
          Keluar
        </button>
      </div>
    </div>
  </div>

  <div class="max-w-7xl mx-auto p-4 space-y-6 mt-4">
    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

      <!-- Products Widget -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
        <div class="bg-gradient-to-r from-blue-500 to-cyan-500 p-5 flex justify-between items-center text-white">
          <h2 class="text-xl font-extrabold tracking-tight">🍗 Stok Produk</h2>
          <span class="text-2xl drop-shadow-sm">📦</span>
        </div>
        <div class="p-5 flex-1 overflow-y-auto max-h-[70vh] bg-gray-50/30">
          <div id="productsLiveList" class="space-y-4">
            <p class="text-center text-gray-500 py-4 font-medium">Memuat data produk...</p>
          </div>
        </div>
      </div>

      <!-- Materials Widget -->
      <div class="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden flex flex-col">
        <div class="bg-gradient-to-r from-emerald-500 to-teal-500 p-5 flex justify-between items-center text-white">
          <h2 class="text-xl font-extrabold tracking-tight">📋 Stok Bahan</h2>
          <span class="text-2xl drop-shadow-sm">🧪</span>
        </div>
        <div class="p-5 flex-1 overflow-y-auto max-h-[70vh] bg-gray-50/30">
          <div id="materialsLiveList" class="space-y-4">
            <p class="text-center text-gray-500 py-4 font-medium">Memuat data bahan...</p>
          </div>
        </div>
      </div>

    </div>
  </div>

  <!-- Navigation -->
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t shadow-lg z-30">
    <div class="flex justify-around">
      <a href="/"
        class="flex-1 py-3 text-center text-gray-600 font-semibold border-t-2 border-transparent hover:text-orange-600">
        🏪 Penjualan
      </a>
      <a href="/admin.html"
        class="flex-1 py-3 text-center text-gray-600 font-semibold border-t-2 border-transparent hover:text-orange-600">
        📦 Inventori
      </a>
      <a href="/admin.html?tab=history"
        class="flex-1 py-3 text-center text-gray-600 font-semibold border-t-2 border-transparent hover:text-orange-600">
        📊 Riwayat
      </a>
      <a href="/live.html"
        class="flex-1 py-3 text-center text-blue-600 border-t-2 border-blue-600 font-semibold bg-blue-50">
        📡 Live Stock
      </a>
    </div>
  </nav>

  <script>
    async function fetchLiveStock() {
      try {
        const [productsRes, materialsRes] = await Promise.all([
          fetch('/api/products'),
          fetch('/api/materials')
        ]);

        let products = [];
        let materials = [];

        if (productsRes.ok) products = await productsRes.json();
        if (materialsRes.ok) materials = await materialsRes.json();

        renderProductsStock(products);
        renderMaterialsStock(materials);

        const now = new Date();
        document.getElementById('lastSync').textContent = `Terakhir Sync: ${now.toLocaleTimeString()}`;
      } catch (err) {
        console.error('Failed to fetch live stock:', err);
        document.getElementById('lastSync').textContent = `Sync Error`;
      }
    }

    function renderProductsStock(items) {
      const container = document.getElementById('productsLiveList');
      if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-4">Tidak ada data produk</p>';
        return;
      }
      container.innerHTML = items.map(p => {
        let statusClass = 'border-gray-200 bg-white';
        let stockLabel = 'text-green-600';
        if (p.stock <= p.min_stock) {
          statusClass = 'low-stock';
          stockLabel = 'text-orange-600';
        }
        if (p.stock === 0) {
          statusClass = 'crit-stock';
          stockLabel = 'text-red-600';
        }

        return `
          <div class="stock-card p-4 rounded-lg border ${statusClass} flex justify-between items-center">
            <div>
              <h3 class="font-bold text-gray-800">${p.name}</h3>
              <p class="text-xs text-gray-500">${p.category}</p>
            </div>
            <div class="text-right">
              <span class="block text-2xl font-black ${stockLabel}">${p.stock}</span>
              <span class="text-xs text-gray-500">Min: ${p.min_stock}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    function renderMaterialsStock(items) {
      const container = document.getElementById('materialsLiveList');
      if (items.length === 0) {
        container.innerHTML = '<p class="text-center text-gray-500 py-4">Tidak ada data bahan</p>';
        return;
      }
      container.innerHTML = items.map(m => {
        let statusClass = 'border-gray-200 bg-white';
        let stockLabel = 'text-green-600';
        if (m.stock <= m.min_stock) {
          statusClass = 'low-stock';
          stockLabel = 'text-orange-600';
        }
        if (m.stock === 0) {
          statusClass = 'crit-stock';
          stockLabel = 'text-red-600';
        }

        return `
          <div class="stock-card p-4 rounded-lg border ${statusClass} flex justify-between items-center">
            <div>
              <h3 class="font-bold text-gray-800">${m.name}</h3>
              <p class="text-xs text-gray-500">${m.category}</p>
            </div>
            <div class="text-right">
              <span class="block text-2xl font-black ${stockLabel}">${m.stock} <span class="text-sm font-normal">${m.unit}</span></span>
              <span class="text-xs text-gray-500">Min: ${m.min_stock}</span>
            </div>
          </div>
        `;
      }).join('');
    }

    // Initial fetch
    fetchLiveStock();
    // Poll every 5 seconds
    setInterval(fetchLiveStock, 5000);
  </script>
</body>

</html>
